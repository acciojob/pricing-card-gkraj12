<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 300px;
            padding: 20px;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            margin: auto;
            margin-top: 50px;
        }
        img{
            width: 100%;
        }
        button{
            background: #ff6b6f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://picsum.photos/300/200">
        <h1>Pricing Card</h1>
        <p>Price: Rs.200</p>
        <p>Description: Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
